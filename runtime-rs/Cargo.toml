[package]
name          = "compact-runtime"
version       = "0.16.100"
edition       = "2021"
license       = "Apache-2.0"
description   = "Native Rust runtime facade for code generated by compactc --rust. Mirrors @midnight-ntwrk/compact-runtime."
repository    = "https://github.com/LFDT-Minokawa/compact"
homepage      = "https://github.com/LFDT-Minokawa/compact"
documentation = "https://docs.rs/compact-runtime"
readme        = "README.md"
keywords      = ["compact", "midnight", "compactc", "zk", "blockchain"]
categories    = ["cryptography::cryptocurrencies", "compilers"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lib]
name = "compact_runtime"
path = "src/lib.rs"

[dependencies]
midnight-base-crypto      = { workspace = true }
midnight-transient-crypto = { workspace = true }
midnight-onchain-state    = { workspace = true }
midnight-onchain-vm       = { workspace = true }
midnight-onchain-runtime  = { workspace = true }
midnight-coin-structure   = { workspace = true }
midnight-zswap            = { workspace = true }
midnight-serialize        = { workspace = true }
midnight-storage          = { workspace = true }
# `version = "=0.16.100"` is required for `cargo publish` to accept this
# manifest — crates.io rejects path-only dependencies. The `=` pin keeps
# the two crates lock-stepped: bumping `compact-runtime` to 0.16.101 must
# also bump `compact-runtime-macros` to 0.16.101. See
# docs/superpowers/notes/2026-06-02-crates-io-publication-plan.md.
compact-runtime-macros    = { path = "../runtime-rs-macros", version = "=0.16.100" }
