name: Compute release notes

on:
  workflow_call:
    inputs:
      release_notes_file:
        description: 'Release notes file'
        required: false
        type: string
        default: ''
      branch:
        description: 'Branch to grab release notes from'
        required: true
        type: string
        default: 'release/midnight'
      release_notes_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      release_notes_pr_description:
        description: 'PR description for release notes'
        required: true
        type: string
        default: 'Compact toolchain release notes copied to midnight-docs'
    secrets:
      MIDNIGHTCI_PACKAGES_READ:
        required: true
      MIDNIGHTCI_PACKAGES_WRITE:
        required: true
      ATTIC_CACHE_TOKEN:
        required: true
      MIDNIGHTCI_REPO:
        required: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest-16-core-x64
    steps:
      - name: Checkout compact repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          path: compact

      - name: Checkout midnight-docs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: midnightntwrk/midnight-docs
          ref: ${{ inputs.release_notes_branch }}
          token: ${{ secrets.MIDNIGHTCI_REPO }}
          path: midnight-docs

      - name: Copy release notes and push
        run: |
          FILENAME=$(basename ${{ inputs.release_notes_file }})
          cp compactc/${{ inputs.release_notes_file }} midnight-docs/docs/relnotes/compact/${FILENAME}

          cd midnight-docs
          git config user.name "midnight-ci"
          git config user.email "ci@midnight.network"

          git checkout -b compact-release-notes-${{ github.run_id }}
          git add .
          git commit -m "Add Compact toolchain release notes"
          git push origin compact-release-notes-${{ github.run_id }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_REPO }}
        run: |
          gh pr create \
            --repo midnightntwrk/midnight-docs \
            --base ${{ inputs.release_notes_branch }} \
            --head "compact-release-notes-${{ github.run_id }}" \
            --title "${{ inputs.release_notes_pr_description }}" \
            --body 'PR: ${{ inputs.release_notes_pr_description }}'
