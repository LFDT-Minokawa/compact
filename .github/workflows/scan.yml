name: Scan
permissions: {}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}   # so you can still run it manually
  schedule:
    - cron: '0 0 * * *'   # run daily at midnight UTC
concurrency:
  group:
    ${{ github.event_name != 'merge_group' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true

jobs:
  scan:
    name: "scan"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  #v6.0.3

      - name: Scan code
        uses: midnightntwrk/upload-sarif-github-action@0fb83f20a00c45709de4a57d628cedbc38be46c5
        with:
          scorecard_checks: "Binary-Artifacts,Branch-Protection,CI-Tests,CII-Best-Practices,Code-Review,Dangerous-Workflow,Dependency-Update-Tool,Fuzzing,License,Maintained,Pinned-Dependencies,SAST,Security-Policy,Signed-Releases,Vulnerabilities"
