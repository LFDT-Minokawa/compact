name: Debugging project build

on:
  workflow_dispatch:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout compactc repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Nix with cache
        uses: ./.github/actions/setup-nix-cache
        with:
          attic_token: ${{ secrets.ATTIC_CACHE_TOKEN }}

      - name: Build lib
        run: |
          nix build .#runtime.forPublish

      - name: Install dependencies
        run: |
          cd ./debug-test
          yarn install

      - name: Compile contract
        run: |
          cd ./debug-test
          nix develop .#compiler --command compactc src/contract.compact gen

      - name: Build and test
        run: |
          cd ./debug-test
          yarn build
          yarn test
