name: Generate documentation

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to grab docs from'
        required: true
        type: string
        default: 'release/midnight'
      docs_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      pr_description:
        description: 'PR description for docs'
        required: true
        type: string
        default: 'Example PR description for midnight-docs'
      draft_pr:
        description: 'Create PR as draft'
        required: false
        type: boolean
        default: false
    secrets:
      MIDNIGHTCI_PACKAGES_READ:
        required: true
      MIDNIGHTCI_PACKAGES_WRITE:
        required: true
      ATTIC_CACHE_TOKEN:
        required: true
      MIDNIGHTCI_REPO:
        required: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest-16-core-x64
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
            extra-substituters = https://cache.iog.io
            accept-flake-config = true

      - name: Cache Nix
        uses: input-output-hk/actions/attic@8663542d03a41382d97ee344a4e3955280db5f95 # latest
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          endpoint: https://attic.ci.iog.io
          cache: midnight-public
          access_token: ${{ secrets.ATTIC_CACHE_TOKEN }}

      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}

      - name: Setup .npmrc
        run: |
          cd ./runtime
          echo "
          //npm.pkg.github.com/:_authToken=${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          @midnight-ntwrk:registry=https://npm.pkg.github.com/
          " > .npmrc

      - name: Configure yarn
        run: |
          cd ./runtime
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}"
          echo 'checksumBehavior: update' >> ./.yarnrc.yml

      - name: Build runtime
        run: |
          nix build .#runtime.forPublish

      - name: Generate runtime docs
        run: |
          nix develop --command bash -c "cd ./runtime ; npm run build ; npm run generate-docs"

      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "midnightntwrk/midnight-docs"
          token: ${{ secrets.MIDNIGHTCI_REPO }}
          path: "midnight-docs"
          ref: ${{ inputs.docs_branch }}

      - name: Manual Git Push
        run: |
          cd midnight-docs
          git config user.name "midnight-ci"
          git config user.email "ci@midnight.network"

          git checkout -b compact-docs-update-${{ github.run_id }}

          cp ../doc/ledger-adt.mdx docs/compact/data-types/ledger-adt.mdx
          cp ../doc/ledger-adt.mdx docs/compact/reference/ledger-adt.mdx

          cp ../doc/writing.mdx docs/compact/reference/writing.mdx
          cp ../doc/compact-reference.mdx docs/compact/reference/compact-reference.mdx
          cp ../doc/explicit-disclosure.mdx docs/compact/reference/explicit-disclosure.mdx
          cp ../doc/compact-grammar.mdx docs/compact/reference/compact-grammar.mdx
          cp ../doc/compact-keywords.mdx docs/compact/reference/compact-keywords.mdx

          cp ../doc/api/CompactStandardLibrary/exports.md docs/compact/standard-library/exports.md
          cp ../doc/api/CompactStandardLibrary/README.md docs/compact/standard-library/README.md

          cp ../doc/compiler-usage.md docs/compact/compilation-and-tooling/compiler-usage.md
          cp ../doc/formatter-usage.md docs/compact/compilation-and-tooling/formatter-usage.md
          cp ../doc/fixup-usage.md docs/compact/compilation-and-tooling/fixup-usage.md

          cp -r ../doc/api/runtime/. ./api-reference/compact-runtime
          echo -e "# Compact runtime API\n\n$(cat ../doc/api/runtime/README.md)" > ./api-reference/compact-runtime/README.md

          python3 - "../src/compiler-custom.css" "static/docs-custom.css" <<'PYEOF'
# Syncs marked blocks from compiler-custom.css into docs-custom.css.
#
# Each sync block is delimited by:
#   /* BEGIN_COMPACT_SYNC: <tag> */ ... /* END_COMPACT_SYNC: <tag> */
#
# Two modes, determined by whether any line inside the docs block carries /* COMPACT_SYNC */:
#
#   Whole-block (no /* COMPACT_SYNC */ lines):
#     The entire block content is replaced verbatim with the compiler's version.
#
#   Line-level (some lines have /* COMPACT_SYNC */):
#     Only those marked lines are updated, matched to the compiler block by CSS
#     property name. The /* COMPACT_SYNC */ marker is preserved on the updated line.
#
# The BEGIN/END marker lines themselves are always kept from the docs file.

import re
import sys
from pathlib import Path

BEGIN_RE = re.compile(r"/\* BEGIN_COMPACT_SYNC: (\S+) \*/")
END_RE   = re.compile(r"/\* END_COMPACT_SYNC: (\S+) \*/")
LINE_RE  = re.compile(r"/\* COMPACT_SYNC \*/")
PROP_RE  = re.compile(r"^\s*([\w-]+)\s*:")


def parse_blocks(text):
    """Return {tag: [inner lines]} for every sync block in text."""
    blocks = {}
    lines = text.splitlines()
    i = 0
    while i < len(lines):
        m = BEGIN_RE.search(lines[i])
        if m:
            tag = m.group(1)
            inner = []
            i += 1
            while i < len(lines):
                if END_RE.search(lines[i]):
                    break
                inner.append(lines[i])
                i += 1
            blocks[tag] = inner
        i += 1
    return blocks


def prop_name(line):
    m = PROP_RE.match(line)
    return m.group(1) if m else None


def sync(compiler_text, docs_text):
    compiler_blocks = parse_blocks(compiler_text)
    out_lines = []
    docs_lines = docs_text.splitlines(keepends=True)
    i = 0

    while i < len(docs_lines):
        line = docs_lines[i]
        m = BEGIN_RE.search(line)
        if m:
            tag = m.group(1)
            out_lines.append(line)  # keep BEGIN marker from docs
            i += 1

            # Collect docs inner lines up to END marker
            docs_inner = []
            while i < len(docs_lines) and not END_RE.search(docs_lines[i]):
                docs_inner.append(docs_lines[i].rstrip("\r\n"))
                i += 1

            if tag not in compiler_blocks:
                # No matching compiler block — keep docs content unchanged
                for dl in docs_inner:
                    out_lines.append(dl + "\n")
            else:
                compiler_inner = compiler_blocks[tag]
                marked_indices = [j for j, l in enumerate(docs_inner) if LINE_RE.search(l)]

                if not marked_indices:
                    # Whole-block sync: replace inner content verbatim from compiler
                    for cl in compiler_inner:
                        out_lines.append(cl + "\n")
                else:
                    # Line-level sync: update only /* COMPACT_SYNC */ lines
                    updated = list(docs_inner)
                    for j in marked_indices:
                        p = prop_name(LINE_RE.sub("", docs_inner[j]))
                        if p:
                            for cl in compiler_inner:
                                if prop_name(cl) == p:
                                    updated[j] = cl.rstrip() + " /* COMPACT_SYNC */"
                                    break
                    for dl in updated:
                        out_lines.append(dl + "\n")

            # Keep END marker from docs
            if i < len(docs_lines):
                out_lines.append(docs_lines[i])
                i += 1
        else:
            out_lines.append(line)
            i += 1

    return "".join(out_lines)


compiler_path = Path(sys.argv[1])
docs_path     = Path(sys.argv[2])
result = sync(compiler_path.read_text(encoding="utf-8"),
              docs_path.read_text(encoding="utf-8"))
docs_path.write_text(result, encoding="utf-8")
print(f"Updated {docs_path}")
PYEOF
          
          git add .
          git commit -m "Update compact documentation"
          git push origin compact-docs-update-${{ github.run_id }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_REPO }}
        run: |
          DRAFT_FLAG=""
          if [ "${{ inputs.draft_pr }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh pr create \
            --repo midnightntwrk/midnight-docs \
            --base ${{ inputs.docs_branch }} \
            --head "compact-docs-update-${{ github.run_id }}" \
            --title "${{ inputs.pr_description }}" \
            --body 'PR: ${{ inputs.pr_description }}' \
            $DRAFT_FLAG
