name: Make VSC Plugin available to Public

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Provide tag' # example value would be '0.2.13' for 'compact-vsc-plugin-0.2.13'
        required: true

env:
  GITHUB_REPOSITORY: 'midnight-ntwrk/artifacts'
  S3_BUCKET: releases.midnight.network # should be set to releases.midnight.network

jobs:
  download-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write


    steps:

    - name: Create working directory
      run: mkdir compact_vsc_plugin_${{ github.event.inputs.tag }} && cd compact_vsc_plugin_${{ github.event.inputs.tag }}

    - name: Download Release Artifacts
      uses: dsaltares/fetch-gh-release-asset@master
      with:
        version: 'tags/compact-vsc-plugin-${{ github.event.inputs.tag }}'
        regex: true
        file: "compact-.*\\.vsix"
        target: "./"
        token: ${{ secrets.MIDNIGHTBOT_PACKAGES_WRITE }}
        repo: ${{ env.GITHUB_REPOSITORY }}

    - name: AWS - Configure credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::851725512700:role/MidnightS3UploaderRole
        aws-region: eu-west-1

    - name: Upload files to S3
      run: |
        ls -latr
        find . -type f -name 'compact-*' -print0 | xargs -0 -I {} aws s3 cp {} s3://${{ env.S3_BUCKET }}/artifacts/vscode-extension/compact-${{ github.event.inputs.tag }}/

    - name: Clone releases repository
      run: |
        git clone https://github.com/midnight-ntwrk/releases

    - name: Create .link files in new branch and create PR
      working-directory: releases
      run: |
        # Set up Git credentials
        git config credential.helper "store --file=.git/credentials"
        echo "https://github.com:${{ secrets.MIDNIGHTBOT_PACKAGES_WRITE }}@github.com" > .git/credentials

        # create link files
        git checkout -b compact_vsc_plugin_${{ github.event.inputs.tag }}-branch origin/gh-pages
        cd artifacts/vscode-extension
        mkdir -p compact-${{ github.event.inputs.tag }}
        cd compact-${{ github.event.inputs.tag }}
        echo "artifacts/vscode-extension/compact-${{ github.event.inputs.tag }}/compact-${{ github.event.inputs.tag }}.vsix" > compact-${{ github.event.inputs.tag }}.link

        # Add changes to the new branch
        git add .

        # Configure git user info
        git config user.name "MidnightCI"
        git config user.email "midnight-automation@iohk.io"

        # Commit changes with a meaningful message
        git commit -m "Update from ref: $GITHUB_SHA"

        # Push the changes to the external repository
        git push origin compact_vsc_plugin_${{ github.event.inputs.tag }}-branch

        # Set GH_TOKEN environment variable for Github CLI
        export GH_TOKEN="${{ secrets.MIDNIGHTBOT_PACKAGES_WRITE }}"

        # Create a pull request using GitHub CLI
        gh pr create --base gh-pages --head compact_vsc_plugin_${{ github.event.inputs.tag }}-branch --title "Release VSC Plugin version ${{ github.event.inputs.tag }}" --body "Approve this PR to release compact-${{ github.event.inputs.tag }}.vsix to the public."